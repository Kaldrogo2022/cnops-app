name: Build Matrix CNOPS APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'
        channel: 'stable'

    - name: Generate Flutter Project & Inject Code
      run: |
        flutter create app_build
        cp main.dart app_build/lib/main.dart
        cd app_build
        flutter pub add webview_flutter
        
        # رفع إصدار الأندرويد الأدنى لـ 21 لتفادي أخطاء حزمة المتصفح
        sed -i 's/flutter.minSdkVersion/21/g' android/app/build.gradle
        
        # حقن صلاحيات الإنترنت بشكل آمن
        sed -i 's/<application/<uses-permission android:name="android.permission.INTERNET"\/>\n    <application/g' android/app/src/main/AndroidManifest.xml

    - name: Build APK (Release Mode)
      run: |
        cd app_build
        flutter build apk --release

    - name: Upload APK to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Cnops_Matrix_App_Pro
        path: app_build/build/app/outputs/flutter-apk/app-release.apk
